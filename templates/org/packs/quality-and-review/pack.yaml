  - { name: unit-tester, existing: true }
  - { name: e2e-tester, existing: true }
  - { name: tester, existing: true }
  - { name: devils-advocate, existing: true }
  - { name: acceptance-reviewer, existing: true }
  - { name: merge-reviewer, existing: true }
rules:
