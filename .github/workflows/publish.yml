name: Publish to PyPI

# Publishes claude-kit to PyPI via Trusted Publishing (OIDC) — no API token needed.
# Triggered by pushing a version tag (e.g. v0.7.0), by publishing a GitHub Release, or manually.
on:
  push:
    tags: ["v*"]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist and validate
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The trusted publisher on PyPI must reference: workflow `publish.yml` and (if set) environment `pypi`.
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
